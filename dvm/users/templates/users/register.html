<!DOCTYPE html>
<html>
<head>
    <title>Register for Carpool</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { margin-bottom: 20px; color: #333; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 10px; }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
        .messages { color: red; margin-bottom: 15px; font-size: 14px; text-align: left;}
        a.text-link { color: #007bff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Create an Account</h2>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    • {{ message }}<br>
                {% endfor %}
            </div>
        {% endif %}
        
        <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Choose a Username" required>
            <input type="password" name="password" placeholder="Create a Password" required>
            
            <select name="role" required>
                <option value="" disabled selected>Select your role...</option>
                <option value="passenger">I am a Passenger</option>
                <option value="driver">I am a Driver</option>
            </select>

            <button type="submit" class="btn btn-success">Sign Up</button>
        </form>

        <p style="margin-top: 20px; font-size: 14px;">
            Already have an account? <a href="{% url 'login' %}" class="text-link">Log in here</a>
        </p>
    </div>
</body>
</html>

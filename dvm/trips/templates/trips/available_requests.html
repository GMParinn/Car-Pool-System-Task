<!DOCTYPE html>
<html>
<head>
    <title>Available Passengers</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background: #f4f7f6; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #2c3e50; color: white; }
        .btn-accept { background: #27ae60; color: white; padding: 8px 12px; text-decoration: none; border-radius: 4px; font-weight: bold; }
        .btn-accept:hover { background: #219150; }
    </style>
</head>
<body>
    <h2>Passengers Waiting for a Ride</h2>
    <table>
        <thead>
            <tr>
                <th>Passenger</th>
                <th>Pickup</th>
                <th>Dropoff</th>
                <th>Fare</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for req in requests %}
            <tr>
                <td>{{ req.passenger.username }}</td>
                <td>{{ req.pickup_node.name }}</td>
                <td>{{ req.dropoff_node.name }}</td>
                <td>₹{{ req.estimated_fare }}</td>
                <td>
                    <a href="#" class="btn-accept">Accept Ride</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="5">No pending requests at the moment.</td></tr>
            {% endfor %}
        </tbody>
    </table>
    <br>
    <a href="{% url 'driver-dashboard' %}">&larr; Back to Dashboard</a>
</body>
</html>
